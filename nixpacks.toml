[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo_mysql", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype", "php84Extensions.json", "php84Extensions.bcmath", "nodejs_20", "composer"]

[phases.install]
cmds = ["composer install --ignore-platform-reqs", "npm install --legacy-peer-deps"]

[phases.build]
cmds = ["npm run build"]

[phases.start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
